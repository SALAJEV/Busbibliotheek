<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haltecode zoeken</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #007bff;
      --background-light: #f9fafb;
      --background-dark: #121212;
      --text-light: #111;
      --text-dark: #fff;
      --card-bg-light: #fff;
      --card-bg-dark: #1e1e1e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--background-light);
      color: var(--text-light);
      transition: all 0.3s;
    }

    .dark-mode {
      background-color: var(--background-dark);
      color: var(--text-dark);
    }

    .container {
      max-width: 600px;
      margin: 4rem auto;
      background-color: var(--card-bg-light);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: background 0.3s;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dark-mode .container {
      background-color: var(--card-bg-dark);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .description {
      font-size: 1rem;
      margin-bottom: 1.5rem;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      border-radius: 0.75rem;
      border: 1px solid #ccc;
      background-color: #f1f1f1;
      margin-bottom: 0.5rem;
      transition: all 0.3s;
    }

    .dark-mode input {
      background-color: #333;
      color: #fff;
      border-color: #555;
    }

    button {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.75rem;
      background: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.3s ease;
    }

    .error-message {
      color: red;
      margin-top: 10px;
      font-weight: 600;
      animation: fadeIn 0.5s ease-in-out;
    }

    .dark-mode .error-message {
      color: #ff6b6b;
    }

    .last-codes {
      margin-top: 1.5rem;
      text-align: left;
    }

    .last-codes h3 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    .last-codes ul {
      list-style: none;
      padding: 0;
    }

    .last-codes li {
      padding: 0.75rem;
      background-color: #eee;
      margin-top: 0.25rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .last-codes li:hover {
      background-color: #ddd;
    }

    .dark-mode .last-codes li {
      background-color: #333;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Haltecode zoeken</h1>
    <p class="description">Voer een geldige haltecode in om realtime informatie over de halte te verkrijgen.</p>
    <input type="text" id="haltecode" placeholder="Haltecode" onkeypress="handleKeyPress(event)">
    <p id="error-message" class="error-message" style="display:none;">⚠️ Ongeldige haltecode.</p>
    <button onclick="redirectToHalte()">Zoeken</button>
    <div class="last-codes" id="lastCodesContainer" style="display:none;">
      <h3>Laatste haltecodes:</h3>
      <ul id="lastCodesList"></ul>
    </div>
  </div>

  <script>
    function setDarkMode() {
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.add('dark-mode');
      }
    }

    setDarkMode();

    function redirectToHalte() {
      const haltecode = document.getElementById("haltecode").value.trim();
      const errorMessage = document.getElementById("error-message");

      if (/^[1-5]\d{5}$/.test(haltecode)) {
        errorMessage.style.display = "none";
        let lastHaltes = JSON.parse(localStorage.getItem('lastHaltes')) || [];
        if (!lastHaltes.includes(haltecode)) {
          lastHaltes.unshift(haltecode);
          if (lastHaltes.length > 5) lastHaltes.pop();
          localStorage.setItem('lastHaltes', JSON.stringify(lastHaltes));
        }
        window.location.href = "https://www.delijn.be/realtime/" + haltecode + "/20";
      } else {
        errorMessage.style.display = "block";
        if (navigator.vibrate) navigator.vibrate(200);
      }
    }

    function handleKeyPress(event) {
      if (event.key === "Enter") {
        redirectToHalte();
      }
    }

    window.onload = function () {
      const lastHaltes = JSON.parse(localStorage.getItem('lastHaltes')) || [];
      if (lastHaltes.length > 0) {
        const container = document.getElementById("lastCodesContainer");
        const list = document.getElementById("lastCodesList");
        container.style.display = "block";
        lastHaltes.forEach(code => {
          const li = document.createElement("li");
          li.textContent = code;
          li.onclick = () => {
            document.getElementById("haltecode").value = code;
            redirectToHalte();
          };
          list.appendChild(li);
        });
      }
    };
  </script>
</body>
</html>
